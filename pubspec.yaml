name: post_it
description: A new Flutter project.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0
  dio_http_formatter: ^3.0.0
  connectivity_plus: ^6.1.4
  http_certificate_pinning: ^3.0.1
  dart_jsonwebtoken: ^2.9.0

  # State Management
  bloc: ^8.1.4
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Functional
  dartz: ^0.10.1

  # DI
  get_it: ^8.0.2

  # Navigation
  go_router: ^14.6.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  flutter_secure_storage: ^9.2.2

  # Internationalization
  intl: ^0.19.0

  # UI
  flutter_svg: ^2.0.10+1
  fluttertoast: ^8.2.8
  cached_network_image: ^3.4.1

  # App Info
  package_info_plus: ^8.1.2

  # Security
  no_screenshot: ^0.3.0+2

  # Logger
  logger: ^2.5.0

  # Receipt Scanner
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.1

  # Sharing
  share_plus: ^10.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Testing
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

  # Code Generation
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

  # App Config
  flutter_launcher_icons: ^0.14.3
  change_app_package_name: ^1.4.0
  intl_utils: ^2.8.8

flutter_intl:
  enabled: true
  arb_dir: lib/l10n
  output_dir: lib/generated
  main_locale: id

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/
    - assets/icons/
  fonts: []
